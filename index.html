<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; }
      .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
      h2 { color: #333; text-align: center; }
      .search-box { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
      input[type="text"] { width: 60%; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; }
      button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
      button:hover { background-color: #0056b3; }
      button:disabled { background-color: #ccc; }
      
      table { width: 100%; border-collapse: collapse; margin-top: 20px; }
      th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
      th { background-color: #007bff; color: white; }
      tr:hover { background-color: #f1f1f1; }
      .loading { text-align: center; display: none; margin-top: 20px; color: #666; }
      .meta-tag { font-size: 0.85em; color: #666; background: #eee; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>音樂資料庫整合搜尋</h2>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="輸入歌名、歌手或關鍵字..." onkeypress="handleEnter(event)">
        <button id="searchBtn" onclick="runSearch()">搜尋</button>
      </div>
      
      <div id="loading" class="loading">搜尋中，資料量大請稍候...</div>
      <div id="resultArea"></div>
    </div>

    <script>
      function handleEnter(e) {
        if (e.key === 'Enter') runSearch();
      }

      function runSearch() {
        const keyword = document.getElementById('searchInput').value;
        if (!keyword) return;

        document.getElementById('searchBtn').disabled = true;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').innerHTML = '';

        google.script.run
          .withSuccessHandler(showResults)
          .withFailureHandler(showError)
          .searchAllSheets(keyword);
      }

      function showResults(data) {
        document.getElementById('searchBtn').disabled = false;
        document.getElementById('loading').style.display = 'none';
        const resultDiv = document.getElementById('resultArea');

        if (data.length === 0) {
          resultDiv.innerHTML = '<p style="text-align:center;">找不到相關資料。</p>';
          return;
        }

        let html = '<table><thead><tr><th>來源檔案</th><th>歌名</th><th>歌手</th><th>備註</th></tr></thead><tbody>';
        data.forEach(item => {
          html += `<tr>
            <td><span class="meta-tag">${item.sourceFile}</span> <br><small>${item.sheetName}</small></td>
            <td style="font-weight:bold;">${item.songName}</td>
            <td>${item.artist}</td>
            <td>${item.note}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        resultDiv.innerHTML = html;
      }

      function showError(error) {
        document.getElementById('searchBtn').disabled = false;
        document.getElementById('loading').style.display = 'none';
        alert('發生錯誤: ' + error.message);
      }
    </script>
  </body>
</html>
