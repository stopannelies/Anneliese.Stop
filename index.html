<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綜藝👍級棒 - 系統目錄</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FCFAF2; color: #2D3436; padding-bottom: 80px; }
        .header-main { background-color: #F08300; color: white; letter-spacing: 0.15em; box-shadow: 0 4px 0px #C86000; }
        .left-header-blue { background-color: #2EA9DF; color: white; }
        .left-sub-blue { background-color: #A0D8EF; color: #005C85; }
        .bonus-header { background-color: #E95295; color: white; }
        .bonus-text { color: #C70067; }
        .rating-purple-header { background-color: #6F599C; color: white; }
        .rating-bg-light { background-color: #F3F0F9; }
        .menu-header { background-color: #2EA9DF; color: white; letter-spacing: 0.1em;}
        .menu-category { background-color: #7DB9DE; color: #FFFFFF; font-weight: bold; }
        .menu-link { color: #1B813E; font-weight: 500; text-decoration: none; border-bottom: none; transition: all 0.2s; padding: 4px 8px; border-radius: 4px; cursor: pointer; display: inline-block; }
        .menu-link:hover, .menu-link.active { color: #F08300; background-color: rgba(240, 131, 0, 0.08); }
        .search-panel { background-color: #FFFFFF; border: 2px solid #2EA9DF; border-radius: 8px; overflow: hidden; margin-top: 10px; transition: all 0.3s ease; }
        .search-header { background-color: #E6F4F1; color: #2D3436; font-weight: bold; }
        .result-table { table-layout: fixed; width: 100%; }
        .result-table th { background-color: #E2E8F0; color: #2D3436; font-size: 0.8rem; padding: 4px 4px; vertical-align: middle; border: 1px solid #CBD5E0; font-weight: bold; text-align: center; line-height: 1.1; height: 40px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; position: relative; }
        .result-table td { padding: 6px 4px; font-size: 0.9rem; border: 1px solid #E2E8F0; vertical-align: top; white-space: pre; overflow: hidden; text-overflow: ellipsis; }
        .result-table tr:hover { background-color: #FFF9E5; }
        .link-cell { color: #2980b9; text-decoration: underline; font-weight: bold; }
        .header-small { display: block; font-size: 0.65rem; color: #666; transform: scale(0.95); font-weight: normal; }
        .card-shadow { box-shadow: 0 2px 5px rgba(0,0,0,0.08); border-radius: 6px; border: 1px solid #E5E5E5; }
        .font-compact { letter-spacing: -0.02em; }
        .browser-frame-container { border: 2px solid #A0D8EF; border-radius: 6px; overflow: hidden; background: white; height: 350px; display: flex; flex-direction: column; }
        .browser-toolbar { background: #E1F5FE; padding: 4px 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #B3E5FC; height: 32px; }
        .browser-title { font-weight: bold; color: #0277BD; font-size: 0.8rem; display: flex; align-items: center; gap: 4px; }
        .browser-actions { display: flex; gap: 4px; }
        .browser-btn { color: #0288D1; cursor: pointer; transition: all 0.2s; padding: 2px; font-size: 0.8rem; }
        .browser-btn:hover { color: #01579B; background-color: rgba(255,255,255,0.5); border-radius: 4px; }
        .browser-iframe { border: none; background: white; position: absolute; top: 0; left: 0; }
        .browser-content-wrapper { flex: 1; width: 100%; height: 100%; overflow: hidden; position: relative; }
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px; border-radius: 5px; font-size: 1rem; z-index: 9999; opacity: 0; transition: opacity 0.3s ease-in-out; pointer-events: none; }
        .toast.show { opacity: 1; }
        .cell-popup { position: fixed; z-index: 50; background: white; border: 1px solid #ccc; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 6px; padding: 10px; max-width: 300px; word-wrap: break-word; white-space: pre-wrap; font-size: 0.9rem; color: #333; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 1. 樣式與邏輯 (支援物件輸入)
        const getText = (val) => (val && typeof val === 'object' && val.t) ? val.t.toString() : (val ? val.toString() : "");
        
        const getRemakeStyle = (val) => {
            const text = getText(val);
            if (["大棠", "吉馬家", "林垂立", "奇歌", "金光", "ACMA", "無"].some(k => text.includes(k))) return "bg-red-50 text-red-600 font-bold";
            if (text.includes("MPA")) return "text-orange-500 font-bold";
            if (["豪記", "TMCA", "時藝", "動脈", "放音樂", "穩盈", "華特", "公版"].includes(text)) return "text-green-600 font-bold";
            return "";
        };
        const isRedRemake = (val) => {
            const text = getText(val);
            return ["大棠", "吉馬家", "林垂立", "奇歌", "金光", "ACMA", "無"].some(k => text.includes(k));
        };
        const isMedley45 = (val) => {
            return getText(val).includes("45轉");
        };
        const getMPAStyle = (val) => {
            const text = getText(val);
            if (text === "無收費") return "bg-red-500 text-white font-bold px-1 rounded";
            return "";
        };
        const formatForExcel = (val) => {
            const str = getText(val);
            if (!str) return "";
            if (str.includes('\n') || str.includes('\r') || str.includes('\t') || str.includes('"')) {
                return `"${str.replace(/"/g, '""')}"`;
            }
            return str;
        };

        // 2. ResultTable (支援物件資料 {t, p})
        const ResultTable = ({ headers, data, enableCopy, remakeColIndex, mpaColIndex, medleyColIndex, enableRowSelection, hiddenColumnsInCopy, defaultColumnSelection }) => {
            const [copyMode, setCopyMode] = useState(false);
            const [selectedCols, setSelectedCols] = useState([]);
            const [selectedRows, setSelectedRows] = useState(new Set());
            const [showToast, setShowToast] = useState(false);
            const [filterRemake, setFilterRemake] = useState(false);
            const [filterMedley, setFilterMedley] = useState(false);
            const [popup, setPopup] = useState(null);

            useEffect(() => {
                if (copyMode) {
                    const allIndices = headers.map((_, i) => i);
                    const visibleIndices = allIndices.filter(i => !(hiddenColumnsInCopy || []).includes(i));
                    if (defaultColumnSelection === 'all') setSelectedCols(visibleIndices);
                    else setSelectedCols([]);
                    setSelectedRows(new Set());
                }
            }, [copyMode, headers, hiddenColumnsInCopy, defaultColumnSelection]);

            const getFilteredData = useCallback(() => {
                return data.filter(row => {
                    if (filterRemake && remakeColIndex !== undefined && isRedRemake(row[remakeColIndex])) return false;
                    if (filterMedley && medleyColIndex !== undefined && isMedley45(row[medleyColIndex])) return false;
                    return true;
                });
            }, [data, filterRemake, remakeColIndex, filterMedley, medleyColIndex]);

            const handleCopy = useCallback(() => {
                let filteredData = getFilteredData();
                if (copyMode && enableRowSelection && selectedRows.size > 0) {
                    filteredData = filteredData.filter((_, index) => selectedRows.has(index));
                }
                if (filteredData.length === 0 || selectedCols.length === 0) return;
                const text = filteredData.map(row => row.filter((_, i) => selectedCols.includes(i)).map(cell => formatForExcel(cell)).join('\t')).join('\n');
                navigator.clipboard.writeText(text).then(() => { setShowToast(true); setTimeout(() => setShowToast(false), 2000); setCopyMode(false); });
            }, [copyMode, enableRowSelection, selectedRows, selectedCols, getFilteredData]);

            const toggleCol = (idx) => setSelectedCols(prev => prev.includes(idx) ? prev.filter(i => i !== idx) : [...prev, idx]);
            const toggleRow = (idx) => setSelectedRows(prev => { const newSet = new Set(prev); if (newSet.has(idx)) newSet.delete(idx); else newSet.add(idx); return newSet; });
            const selectAllCols = () => setSelectedCols(headers.map((_, i) => i).filter(i => !(hiddenColumnsInCopy || []).includes(i)));
            const selectNoCols = () => setSelectedCols([]);
            const displayData = getFilteredData();

            const handleCellClick = (e, cellData, isLink) => {
                if (isLink || copyMode) return;
                // 如果是物件 {t, p}，彈出 p，否則彈出 cellData
                const content = (cellData && typeof cellData === 'object' && cellData.p) ? cellData.p : cellData;
                const rect = e.target.getBoundingClientRect();
                let left = rect.right + 5;
                const top = rect.top;
                if (left + 300 > window.innerWidth) left = rect.left - 310;
                setPopup({ content, x: left, y: top });
            };

            useEffect(() => { const closePopup = () => setPopup(null); if (popup) document.addEventListener('click', closePopup); return () => document.removeEventListener('click', closePopup); }, [popup]);

            return (
                <div className="relative">
                    {enableCopy && (
                        <div className="flex justify-between items-center mb-2">
                             <div className="flex gap-2">{copyMode && (<><button onClick={selectAllCols} type="button" className="text-xs bg-blue-100 hover:bg-blue-200 text-blue-700 px-2 py-1 rounded">全選</button><button onClick={selectNoCols} type="button" className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded">全不選</button></>)}</div>
                             <div className="flex gap-2">{!copyMode ? (<button onClick={() => setCopyMode(true)} type="button" className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-2 py-1 rounded border border-gray-300 flex items-center"><i className="fas fa-clipboard mr-1"></i> 複製</button>) : (<><button onClick={handleCopy} type="button" className="text-xs bg-green-500 hover:bg-green-600 text-white px-2 py-1 rounded shadow flex items-center"><i className="fas fa-check mr-1"></i> 確認複製</button><button onClick={() => setCopyMode(false)} type="button" className="text-xs bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded shadow flex items-center"><i className="fas fa-times mr-1"></i> 取消</button></>)}</div>
                        </div>
                    )}
                    <div className="overflow-x-auto border border-gray-200 rounded">
                        <table className="result-table text-left border-collapse">
                            <thead>
                                {copyMode && (<tr className="bg-gray-50 border-b border-gray-200">{enableRowSelection && <th className="w-10 p-1"></th>}{headers.map((_, i) => { if (hiddenColumnsInCopy && hiddenColumnsInCopy.includes(i)) return null; return <th key={i} style={{width: headers[i].width}} className="text-center p-1"><input type="checkbox" checked={selectedCols.includes(i)} onChange={() => toggleCol(i)} className="cursor-pointer" /></th>; })}</tr>)}
                                <tr>{copyMode && enableRowSelection && <th className="w-10 text-center bg-gray-100"><i className="fas fa-check-square text-gray-400"></i></th>}{headers.map((h, i) => { if (copyMode && hiddenColumnsInCopy && hiddenColumnsInCopy.includes(i)) return null; return (<th key={i} style={{width: h.width}}><div className="flex items-center justify-center gap-1">{typeof h.render === 'function' ? h.render() : (h.title || h.render)}{remakeColIndex === i && <button onClick={() => setFilterRemake(!filterRemake)} type="button" className={`ml-1 w-5 h-5 rounded-full flex items-center justify-center transition-colors ${filterRemake ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-500 hover:bg-gray-300'}`}><i className="fas fa-filter text-xs"></i></button>}{medleyColIndex === i && <button onClick={() => setFilterMedley(!filterMedley)} type="button" className={`ml-1 w-5 h-5 rounded-full flex items-center justify-center transition-colors ${filterMedley ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-500 hover:bg-gray-300'}`} title="過濾45轉"><i className="fas fa-filter text-xs"></i></button>}</div></th>); })}</tr>
                            </thead>
                            <tbody>
                                {displayData.map((row, ri) => (
                                    <tr key={ri} className={copyMode && enableRowSelection && selectedRows.has(ri) ? "bg-blue-50" : ""}>
                                        {copyMode && enableRowSelection && (<td className="text-center border-r border-gray-200"><input type="checkbox" checked={selectedRows.has(ri)} onChange={() => toggleRow(ri)} className="cursor-pointer w-4 h-4" /></td>)}
                                        {row.map((c, ci) => { 
                                            if (copyMode && hiddenColumnsInCopy && hiddenColumnsInCopy.includes(ci)) return null; 
                                            
                                            // 資料解析: 如果是物件 {t, p}，顯示 t，否則顯示 c
                                            const displayContent = (c && typeof c === 'object' && c.t) ? c.t : c;
                                            
                                            let styleClass = ""; 
                                            if (ci === remakeColIndex) styleClass = getRemakeStyle(c); 
                                            if (ci === mpaColIndex) styleClass = getMPAStyle(c); 
                                            
                                            const isLink = (typeof c === 'string' && c.startsWith('http')); 
                                            
                                            return (
                                                <td 
                                                    key={ci} 
                                                    className={`${styleClass} cursor-pointer hover:bg-yellow-50 transition-colors`} 
                                                    onClick={(e) => { e.stopPropagation(); handleCellClick(e, c, isLink); }}
                                                >
                                                    {isLink ? <a href={c} target="_blank" rel="noopener noreferrer" className="link-cell"><i className="fas fa-link mr-1 text-xs"></i>Link</a> : displayContent}
                                                </td>
                                            ); 
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className={`toast ${showToast ? 'show' : ''}`}>已複製</div>
                    {popup && (<div className="cell-popup animate-pulse" style={{ top: popup.y, left: popup.x, animation: 'none' }} onClick={(e) => e.stopPropagation()}><button onClick={() => setPopup(null)} className="absolute -top-2 -right-2 bg-gray-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs shadow hover:bg-gray-600 focus:outline-none"><i className="fas fa-times"></i></button>{popup.content}</div>)}
                </div>
            );
        };

        // 3. 標題定義
        const copyrightHeaders = [{render:()=><span>次數<span className="header-small">(無除夕)</span></span>,width:"50px"},{render:()=><span>唱過<span className="header-small">(無45轉)</span></span>,width:"70px"},{render:"歌名",width:"150px"},{render:"重製",width:"55px"},{render:"MPA",width:"55px"},{render:"首句歌詞",width:"160px"},{render:"原唱人",width:"70px"},{render:"連結",width:"60px"},{render:"特殊備註",width:"120px"},{render:"作詞人",width:"70px"},{render:()=><span>詞<br/>公權</span>,width:"55px"},{render:"詞重權",width:"70px"},{render:()=><span>詞<br/>百分比</span>,width:"55px"},{render:"作曲人",width:"70px"},{render:"曲公權",width:"55px"},{render:"曲重權",width:"70px"},{render:()=><span>曲<br/>百分比</span>,width:"55px"},{render:"編曲",width:"70px"}];
        const origSingerHeaders = [{render:"歌名",width:"150px"},{render:"重製",width:"55px"},{render:"MPA",width:"55px"},{render:"首句歌詞",width:"160px"},{render:"原唱人",width:"70px"},{render:"連結",width:"60px"},{render:"特殊備註",width:"120px"},{render:"作詞人",width:"70px"},{render:()=><span>詞<br/>公權</span>,width:"55px"},{render:"詞重權",width:"70px"},{render:()=><span>詞<br/>百分比</span>,width:"55px"},{render:"作曲人",width:"70px"},{render:"曲公權",width:"55px"},{render:"曲重權",width:"70px"},{render:()=><span>曲<br/>百分比</span>,width:"55px"},{render:"編曲",width:"70px"}];
        
        // 特殊查詢標題 (移除演唱者、錄影日期、單元等不必要的欄位)
        const specialHeaders = [{title:"次數",width:"50px"},{title:"歌名",width:"150px"},{title:"組曲",width:"40px"},{title:"重製",width:"55px"},{title:"MPA",width:"55px"},{title:"首句歌詞",width:"160px"},{title:"原唱人",width:"70px"},{title:"連結",width:"60px"},{title:"特殊備註",width:"120px"},{title:"作詞人",width:"70px"},{title:"詞公權",width:"55px"},{title:"詞重權",width:"70px"},{title:"詞百分比",width:"55px"},{title:"作曲人",width:"70px"},{title:"曲公權",width:"55px"},{title:"曲重權",width:"70px"},{title:"曲百分比",width:"55px"},{title:"編曲",width:"70px"}];

        const recordedHeaders = [{title:"集數",width:"50px"},{title:"播出日期",width:"90px"},{title:"單元",width:"150px"},{title:"歌名",width:"150px"},{title:"演唱者",width:"70px"},{title:"組曲",width:"40px"},{title:"錄影日期",width:"90px"},{title:"錄影日期",width:"90px"},{title:"重製",width:"55px"},{title:"MPA",width:"55px"},{title:"首句歌詞",width:"160px"},{title:"原唱人",width:"70px"},{title:"連結",width:"60px"},{title:"特殊備註",width:"120px"},{title:"作詞人",width:"70px"},{title:"詞公權",width:"55px"},{title:"詞重權",width:"70px"},{title:"詞百分比",width:"55px"},{title:"作曲人",width:"70px"},{title:"曲公權",width:"55px"},{title:"曲重權",width:"70px"},{title:"曲百分比",width:"55px"},{title:"編曲",width:"70px"}];
        const singerListHeaders = [{title:"唱過",width:"50px"},{title:"日期",width:"80px"},{title:"歌手",width:"70px"},{title:"歌名",width:"150px"},{title:"原唱",width:"90px"},{title:"重製",width:"55px"},{title:"MPA",width:"55px"},{title:"首句歌詞",width:"180px"},{title:"原唱人",width:"70px"},{title:"連結",width:"60px"},{title:"特殊備註",width:"120px"}];
        const epHeaders = [{title:"集數",width:"50px"},{title:"播出日期",width:"90px"},{title:"單元",width:"150px"},{title:"曲目",width:"150px"},{title:"演唱者",width:"70px"},{title:"組曲",width:"50px"},{title:"錄影日期",width:"90px"},{title:"重製",width:"55px"},{title:"MPA",width:"70px"},{title:"首句歌詞",width:"160px"},{title:"原唱人",width:"90px"},{title:"連結",width:"70px"},{title:"特殊備註",width:"100px"},{title:"作詞人",width:"70px"},{title:"詞公權",width:"55px"},{title:"詞重權",width:"70px"},{title:"詞百分比",width:"55px"},{title:"作曲人",width:"70px"},{title:"曲公權",width:"55px"},{title:"曲重權",width:"70px"},{title:"曲百分比",width:"55px"},{title:"編曲",width:"70px"}];
        const singerSungHeaders = [{title:"集數",width:"50px"},{title:"播出日期",width:"90px"},{title:"單元",width:"100px"},{title:"曲目",width:"150px"},{title:"演唱者",width:"90px"},{title:"組曲",width:"50px"},{title:"錄影日期",width:"90px"},{title:"重製",width:"60px"},{title:"MPA",width:"70px"},{title:"首句歌詞",width:"160px"},{title:"原唱人",width:"90px"},{title:"連結",width:"70px"},{title:"特殊備註",width:"120px"}];
        const haojiHeaders = [{title:"位置",width:"80px"},{title:"歌名",width:"150px"},{title:"原唱人",width:"90px"},{title:"作詞人",width:"90px"},{title:"作曲人",width:"90px"},{title:"版權資訊",width:"140px"},{title:"首句歌詞",width:"160px"},{title:"備註",width:"100px"}];

        // 4. 連結
        const links = {
            download: { authPublic: "https://docs.google.com/document/d/1clnHPqpcsxw1eZromz-LdavIyeA5jUKDGxia8Tg2Bk4/export?format=docx", authRemake: "https://docs.google.com/document/d/17Pq1NKTkKWNBZh0FEFkHOAh-TJO6Ypc2HECIy0RcpnE/export?format=docx" },
            program: { schedule: "https://docs.google.com/spreadsheets/d/1WULc6ENn4a6_VolJX_1rMjKnRbNzf3SwPRr7geLXnCQ/edit?gid=580247079#gid=580247079", icebing: "https://docs.google.com/spreadsheets/u/0/d/1lQcpINzgcsEWdl-PZpUTxpiFA90KE6DnN_70xFwl8fk/edit" },
            copyright: { member: "https://docs.google.com/spreadsheets/d/1vglQpFQ5Ikpk9BWTnnmQR396zKkFRuro97SoA_xNuns/edit?gid=1616151799#gid=1616151799", mpa: "https://docs.google.com/spreadsheets/d/1KvUTxEF5Az-qhXaGnr-BzPFxO39s4se2Oi0-1ssADbM/edit?gid=1591903723#gid=1591903723", querySource: "https://docs.google.com/spreadsheets/d/1KxHAmz57FOu8ti8l_Zd96lrwCfO5wexPRV0jsvNaVGA/edit?gid=0#gid=0", must: "https://www.must.org.tw/tw/chinese_musical/02.aspx", origQuerySource: "https://docs.google.com/spreadsheets/d/1picJxZ8ue9DM7EHS86TdVAHdr-Qty0nd5eEMvOXCUIY/edit?gid=348730547#gid=348730547" },
            others: { singerListSource: "https://docs.google.com/spreadsheets/d/1mt4dVA3_VmqzyKjf0jbmYQMzJl0sef4G2hcqve7KDQ0/edit?gid=530920512#gid=530920512", epQuerySource: "https://docs.google.com/spreadsheets/d/1KvUTxEF5Az-qhXaGnr-BzPFxO39s4se2Oi0-1ssADbM/edit?gid=622192856#gid=622192856", recordedQuerySource: "https://docs.google.com/spreadsheets/d/1KvUTxEF5Az-qhXaGnr-BzPFxO39s4se2Oi0-1ssADbM/edit?gid=1872621493#gid=1872621493", singerSungQuerySource: "https://docs.google.com/spreadsheets/d/1KvUTxEF5Az-qhXaGnr-BzPFxO39s4se2Oi0-1ssADbM/edit?gid=399230212#gid=399230212", haojiQuerySource: "https://docs.google.com/spreadsheets/d/1BiIWEn1Yh22nOZM_z-HFyNryX_AsjmjnH366VUDRuPg/edit?gid=829761523#gid=829761523", haojiQuery: "#" }
        };

        const CopyrightSearchBlock = ({ hook, label, headers, enableCopy, remakeColIndex, mpaColIndex }) => (
            <div className="mb-4 border-b border-gray-200 pb-4 last:border-0 last:pb-0">
                <div className="font-bold text-gray-500 text-sm mb-2">{label}</div>
                <form onSubmit={(e)=>{e.preventDefault();hook.search(hook.term)}} className="flex gap-2 mb-1">
                    <input type="text" value={hook.term} onChange={(e)=>hook.setTerm(e.target.value)} placeholder="請輸入歌名並按下搜尋" className="flex-1 border-2 border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-400 transition-colors" />
                    <button type="submit" disabled={hook.loading} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-4 py-2 rounded shadow transition-colors">{hook.loading?'...':'查詢'}</button>
                </form>
                <div className="text-gray-400 text-xs mb-2">可輸入關鍵字,避開台語字</div>
                {hook.error && <div className="text-red-500 text-sm mb-2">{hook.error}</div>}
                {hook.results && <ResultTable headers={headers} data={hook.results} enableCopy={enableCopy} remakeColIndex={remakeColIndex} mpaColIndex={mpaColIndex} enableRowSelection={true} hiddenColumnsInCopy={[0, 1]} defaultColumnSelection='all' />}
            </div>
        );
        
        const SimpleSearchPanel = ({ hook, placeholder, headers, enableCopy, remakeColIndex, mpaColIndex, medleyColIndex, note, extraControl, enableRowSelection, hiddenColumnsInCopy, defaultColumnSelection }) => (
            <div className="p-4 bg-white">
                <form onSubmit={(e)=>{e.preventDefault();hook.search(hook.term)}} className="flex gap-2 mb-1 items-center">
                    <input type="text" value={hook.term} onChange={(e)=>hook.setTerm(e.target.value)} placeholder={placeholder} className="flex-1 border-2 border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-400 transition-colors" />
                    {extraControl}
                    <button type="submit" disabled={hook.loading} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-4 py-2 rounded shadow transition-colors">{hook.loading?'...':'查詢'}</button>
                </form>
                {note && <div className="text-gray-400 text-xs mb-2">{note}</div>}
                {hook.error && <div className="text-red-500 text-sm mb-2">{hook.error}</div>}
                {hook.results && <ResultTable headers={headers} data={hook.results} enableCopy={enableCopy} remakeColIndex={remakeColIndex} mpaColIndex={mpaColIndex} medleyColIndex={medleyColIndex} enableRowSelection={enableRowSelection} hiddenColumnsInCopy={hiddenColumnsInCopy} defaultColumnSelection={defaultColumnSelection} />}
            </div>
        );

        const SpecialSearchPanel = ({ hook, headers, enableCopy, remakeColIndex, mpaColIndex }) => (
            <div className="p-4 bg-white">
                <div className="flex gap-2 mb-4">
                    <button onClick={() => hook.search("45轉")} disabled={hook.loading} className="bg-blue-500 hover:bg-blue-600 text-white font-bold px-6 py-2 rounded shadow transition-colors">{hook.loading ? '...' : '45轉'}</button>
                </div>
                {hook.error && <div className="text-red-500 text-sm mb-2">{hook.error}</div>}
                {hook.results && <ResultTable headers={headers} data={hook.results} enableCopy={enableCopy} remakeColIndex={remakeColIndex} mpaColIndex={mpaColIndex} />}
            </div>
        );

        const WebBrowser = ({ title, url, scale = 1 }) => {
            const [refreshKey, setRefreshKey] = useState(0);
            return (
                <div className="browser-frame-container card-shadow">
                    <div className="browser-toolbar">
                        <div className="browser-title"><i className="fas fa-globe text-blue-500"></i> {title}</div>
                        <div className="browser-actions">
                            <button onClick={() => window.open(url, '_blank')} className="browser-btn" title="跳出"><i className="fas fa-external-link-alt"></i></button>
                            <button onClick={() => setRefreshKey(prev => prev + 1)} className="browser-btn" title="重新整理"><i className="fas fa-sync-alt"></i></button>
                        </div>
                    </div>
                    <div className="browser-content-wrapper"><iframe key={refreshKey} src={url} className="browser-iframe" style={{width:`${100/scale}%`, height:`${100/scale}%`, transform:`scale(${scale}) translate(-50%, 0)`, left: '50%', transformOrigin: 'top left'}} title={title} /></div>
                </div>
            );
        };

        const App = () => {
            const API_URL = "https://script.google.com/macros/s/AKfycbzF7XVJK-rIoHBIQvEVF1c4AJJNR4x5f-wkqAaWwCLb9yMflTE3_c9MSEzwwglQQFTwYw/exec";
            const [sheetData, setSheetData] = useState(null);
            const [isLoadingInfo, setIsLoadingInfo] = useState(true);
            const [apiError, setApiError] = useState(null);
            const embeddedSites = [{ title: "TMCA", url: "https://www.tmca.tw/Home/Search", scale: 0.85 }, { title: "ACMA", url: "https://www.acma.org.tw/blank-7", scale: 0.65 }];

            useEffect(() => {
                fetch(`${API_URL}?op=info`).then(res=>res.json()).then(data=>{if(data.error)setApiError(data.error);else setSheetData(data);setIsLoadingInfo(false);}).catch(err=>{console.error(err);setApiError("連線失敗");setIsLoadingInfo(false);});
            }, []);

            const formatDateSimple = (val) => { if(!val)return"-"; if(typeof val==='string'&&val.match(/^\d{1,2}\/\d{1,2}$/))return val; try{const d=new Date(val);if(!isNaN(d.getTime()))return`${d.getMonth()+1}/${d.getDate()}`;}catch(e){return val;}return val; };
            const formatBonus = (val) => val===""||val===null?"0":val;
            const safeInfoData = (data) => { if(!data||!data.infoData)return null; try{return{...data.infoData,today:{...data.infoData.today,date:formatDateSimple(data.infoData.today.date)},nextRecord:{...data.infoData.nextRecord,date:formatDateSimple(data.infoData.nextRecord.date)},broadcast:Array.isArray(data.infoData.broadcast)?data.infoData.broadcast.map(item=>({...item,date:formatDateSimple(item.date)})):[],bonus:{lastMonth:formatBonus(data.infoData.bonus.lastMonth),thisMonth:formatBonus(data.infoData.bonus.thisMonth)}};}catch(e){return null;} };
            const infoData = safeInfoData(sheetData) || {today:{date:apiError?"Err":"載入中",day:".."},nextRecord:{date:"..",day:"",daysLeft:"-"},broadcast:[{title:"讀取中",date:"--/--",days:"-"},{title:"讀取中",date:"--/--",days:"-"}],weekEp:{ep:"-",title:apiError?"讀取失敗":"資料讀取中..."},bonus:{lastMonth:"-",thisMonth:"-"}};
            const ratingData = (sheetData && sheetData.ratingData) ? sheetData.ratingData : {a4:Array(5).fill({rank:"-",name:"載入中...",rating:"-"}),range2549:Array(5).fill({rank:"-",name:"載入中...",rating:"-"})};

            const [panels, setPanels] = useState({copyright:{visible:false,collapsed:false},singerList:{visible:false,collapsed:false},songList:{visible:false,collapsed:false},epQuery:{visible:false,collapsed:false},recordedQuery:{visible:false,collapsed:false},singerSungQuery:{visible:false,collapsed:false},origSingerQuery:{visible:false,collapsed:false},haojiQuery:{visible:false,collapsed:false},specialQuery:{visible:false,collapsed:false},webQuery:{visible:true,collapsed:true}});

            const useSearch = (type) => {
                const [term, setTerm] = useState(""); const [results, setResults] = useState(null); const [loading, setLoading] = useState(false); const [error, setError] = useState(null);
                const clear = () => { setTerm(""); setResults(null); setError(null); setLoading(false); };
                const search = (customTerm, option="") => { const q=customTerm!==undefined?customTerm:term; if(!q||!q.trim())return; setLoading(true); setResults(null); setError(null); fetch(`${API_URL}?op=search&type=${type}&q=${encodeURIComponent(q)}&opt=${option}`).then(res=>res.json()).then(data=>{if(data.error)throw new Error(data.error);setResults(data);setLoading(false);}).catch(err=>{console.error(err);setError("讀取失敗");setLoading(false);}); };
                return { term, setTerm, results, setResults, loading, error, search, clear };
            };

            const copyright1 = useSearch('copyright'); const copyright2 = useSearch('copyright'); const copyright3 = useSearch('copyright');
            const singerList = useSearch('singerList'); const songList = useSearch('songList'); const epQuery = useSearch('ep');
            const recorded = useSearch('recorded'); const singerSung = useSearch('singerSung'); const haoji = useSearch('haoji');
            const origSinger = useSearch('origSinger'); 
            const special = useSearch('special');
            const [singerExcludeSung, setSingerExcludeSung] = useState(false);
            const [songListExcludeSung, setSongListExcludeSung] = useState(false);

            const togglePanelVisibility = (key) => setPanels(prev => { if(prev[key].visible){ 
                if(key==='copyright'){copyright1.clear();copyright2.clear();copyright3.clear();} 
                else if(key==='singerList')singerList.clear(); 
                else if(key==='songList')songList.clear(); 
                else if(key==='epQuery')epQuery.clear(); 
                else if(key==='recordedQuery')recorded.clear(); 
                else if(key==='singerSungQuery')singerSung.clear(); 
                else if(key==='haojiQuery')haoji.clear(); 
                else if(key==='origSingerQuery')origSinger.clear(); 
                else if(key==='specialQuery')special.clear(); 
            } return {...prev,[key]:{...prev[key],visible:!prev[key].visible,collapsed:false}}; });
            const togglePanelCollapse = (key) => setPanels(prev => ({...prev,[key]:{...prev[key],collapsed:!prev[key].collapsed}}));
            const handleSingerCheckboxChange = (e) => { const checked = e.target.checked; setSingerExcludeSung(checked); if(singerList.term) singerList.search(singerList.term, checked); };
            const handleSongListCheckboxChange = (e) => { const checked = e.target.checked; setSongListExcludeSung(checked); if(songList.term) songList.search(songList.term, checked); };

            return (
                <div className="max-w-6xl mx-auto p-3 min-h-screen">
                    {/* (左側代碼維持不變，省略以節省空間) */}
                    {apiError && <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-2 text-center"><strong className="font-bold">讀取錯誤！</strong> <span className="block sm:inline">{apiError}</span></div>}
                    <div className="header-main text-center py-2 text-xl font-bold rounded-lg mb-3">綜藝👍級棒</div>
                    <div className="flex flex-col md:flex-row gap-3 items-start">
                        <div className="w-full md:w-[28%] flex flex-col gap-3">
                            {/* 左側內容... (保持原樣) */}
                             <div className="bg-white rounded-lg overflow-hidden card-shadow"><div className="left-header-blue text-center font-bold py-1 text-sm tracking-wider">今日</div><div className="bg-white py-2 flex justify-center items-center gap-2">{isLoadingInfo?<span className="text-gray-400 animate-pulse">...</span>:<><span className="text-xl font-bold text-gray-800 font-compact">{infoData.today.date}</span><span className="text-lg font-medium text-gray-500 font-compact">{infoData.today.day}</span></>}</div><div className="left-header-blue text-center font-bold py-1 text-sm tracking-wider border-t border-white/20">下次錄影</div><div className="bg-white py-2 flex justify-center items-center gap-2">{isLoadingInfo?<span className="text-gray-400 animate-pulse">...</span>:<><span className="text-xl font-bold text-gray-800 font-compact">{infoData.nextRecord.date}</span><span className="text-lg font-medium text-gray-500 font-compact">{infoData.nextRecord.day}</span></>}</div><div className="left-header-blue text-center font-bold py-1 text-sm tracking-wider border-t border-white/20">剩餘天數</div><div className="bg-white py-2 text-center">{isLoadingInfo?<span className="text-gray-400 animate-pulse">-</span>:<span className="text-3xl font-bold text-gray-800 font-compact">{infoData.nextRecord.daysLeft}</span>}</div></div>
                            <div className="bg-white rounded-lg overflow-hidden card-shadow">{infoData.broadcast.map((item,idx)=>(<div key={idx} className="flex border-b last:border-0 border-gray-100"><div className="left-header-blue w-1/3 flex items-center justify-center text-xs font-bold p-2 whitespace-pre-line leading-relaxed">{item.title}</div><div className="w-1/3 flex items-center justify-center font-bold text-base text-gray-700 border-r border-gray-100 bg-white">{item.date}</div><div className="w-1/3 flex items-center justify-center text-gray-600 font-bold text-base bg-white">{item.days}</div></div>))}</div>
                            <div className="bg-white rounded-lg overflow-hidden card-shadow text-center"><div className="left-sub-blue font-bold py-2 text-base">本週播出</div><div className="bg-white p-3 border-t border-gray-100"><div className="flex flex-row justify-center items-center gap-2"><span className="bg-gray-100 text-gray-800 px-2 py-0.5 rounded font-bold text-lg border border-gray-200">{infoData.weekEp.ep}</span><span className="font-bold text-gray-700 text-sm text-left">{infoData.weekEp.title}</span></div></div></div>
                            <div className="border border-purple-200 rounded-lg overflow-hidden card-shadow"><div className="rating-purple-header text-center font-bold py-1 text-base">A4+前五</div><div className="rating-bg-light p-2 space-y-1">{ratingData.a4.map((row,idx)=>(<div key={idx} className="flex text-sm items-center border-b border-gray-200/60 pb-1 last:border-0 last:pb-0"><div className="w-6 font-bold text-purple-700 text-center shrink-0 text-base font-compact">{row.rank}</div><div className="flex-1 whitespace-pre-line leading-tight text-gray-700 px-2 text-xs font-medium">{row.name}</div><div className="w-10 text-right font-bold text-gray-600 text-sm shrink-0 font-compact">{row.rating}</div></div>))}</div></div>
                            <div className="border border-purple-200 rounded-lg overflow-hidden card-shadow"><div className="rating-purple-header text-center font-bold py-1 text-base">25-49前五</div><div className="rating-bg-light p-2 space-y-1">{ratingData.range2549.map((row,idx)=>(<div key={idx} className="flex text-sm items-center border-b border-gray-200/60 pb-1 last:border-0 last:pb-0"><div className="w-6 font-bold text-purple-700 text-center shrink-0 text-base font-compact">{row.rank}</div><div className="flex-1 whitespace-pre-line leading-tight text-gray-700 px-2 text-xs font-medium">{row.name}</div><div className="w-10 text-right font-bold text-gray-600 text-sm shrink-0 font-compact">{row.rating}</div></div>))}</div></div>
                            <div className="rounded-lg overflow-hidden card-shadow text-center border border-pink-200"><div className="bonus-header font-bold py-1.5 text-sm">上月可領撫慰金的集數</div><div className="bg-white py-1.5 font-bold text-2xl bonus-text font-compact">{infoData.bonus.lastMonth}</div><div className="bonus-header font-bold py-1.5 text-sm border-t border-white/20">本月可領撫慰金的集數</div><div className="bg-white py-1.5 font-bold text-2xl bonus-text font-compact">{infoData.bonus.thisMonth}</div></div>
                        </div>
                        <div className="w-full md:w-[72%] flex flex-col gap-3">
                            {/* 目錄選單 */}
                            <div className="rounded-lg overflow-hidden bg-white card-shadow">
                                <div className="menu-header text-center font-bold py-2 text-lg">目錄</div>
                                <div className="flex flex-col bg-white">
                                    <div className="flex border-b border-gray-100 min-h-[50px]"><div className="menu-category w-24 flex items-center justify-center p-2 text-sm shrink-0">節目資訊</div><div className="flex-1 grid grid-cols-2 gap-2 p-2 items-center pl-4"><a href={links.program.schedule} target="_blank" className="menu-link text-sm">排播&收視</a><a href={links.program.icebing} target="_blank" className="menu-link text-sm">我愛冰冰SHOW</a></div></div>
                                    <div className="flex border-b border-gray-100 min-h-[50px]"><div className="menu-category w-24 flex items-center justify-center p-2 text-sm shrink-0">檔案下載</div><div className="flex-1 grid grid-cols-2 gap-2 p-2 items-center pl-4"><a href={links.download.authPublic} target="_blank" className="menu-link text-sm">公播公傳授權同意書</a><a href={links.download.authRemake} target="_blank" className="menu-link text-sm">重製授權同意書</a></div></div>
                                    <div className="flex border-b border-gray-100 min-h-[50px]"><div className="menu-category w-24 flex items-center justify-center p-2 text-sm shrink-0">版權相關</div><div className="flex-1 grid grid-cols-2 gap-2 p-2 items-center pl-4"><a href={links.copyright.member} target="_blank" className="menu-link text-sm">版權公司會員</a><a href={links.copyright.mpa} target="_blank" className="menu-link text-sm">MPA收費紀錄</a></div></div>
                                    <div className="flex min-h-[50px]"><div className="menu-category w-24 flex items-center justify-center p-2 text-sm shrink-0">各類查詢</div>
                                        <div className="flex-1 grid grid-cols-3 gap-2 p-2 items-center pl-4">
                                            <button onClick={()=>togglePanelVisibility('copyright')} className={`menu-link text-sm text-left ${panels.copyright.visible?'active':''}`}><i className={`fas fa-search mr-1 ${panels.copyright.visible?'text-orange-500':'text-gray-400'}`}></i>版權查詢</button>
                                            <button onClick={()=>togglePanelVisibility('recordedQuery')} className={`menu-link text-sm text-left ${panels.recordedQuery.visible?'active':''}`}><i className={`fas fa-check-circle mr-1 ${panels.recordedQuery.visible?'text-orange-500':'text-gray-400'}`}></i>已錄曲目查詢</button>
                                            <button onClick={()=>togglePanelVisibility('epQuery')} className={`menu-link text-sm text-left ${panels.epQuery.visible?'active':''}`}><i className={`fas fa-list-ol mr-1 ${panels.epQuery.visible?'text-orange-500':'text-gray-400'}`}></i>集數查詢</button>
                                            <button onClick={()=>togglePanelVisibility('singerList')} className={`menu-link text-sm text-left ${panels.singerList.visible?'active':''}`}><i className={`fas fa-microphone-alt mr-1 ${panels.singerList.visible?'text-orange-500':'text-gray-400'}`}></i>歌手歌單查詢</button>
                                            <button onClick={()=>togglePanelVisibility('singerSungQuery')} className={`menu-link text-sm text-left ${panels.singerSungQuery.visible?'active':''}`}><i className={`fas fa-user-tag mr-1 ${panels.singerSungQuery.visible?'text-orange-500':'text-gray-400'}`}></i>歌手已唱查詢</button>
                                            <button onClick={()=>togglePanelVisibility('songList')} className={`menu-link text-sm text-left ${panels.songList.visible?'active':''}`}><i className={`fas fa-music mr-1 ${panels.songList.visible?'text-orange-500':'text-gray-400'}`}></i>歌單歌名查詢</button>
                                            <button onClick={()=>togglePanelVisibility('origSingerQuery')} className={`menu-link text-sm text-left ${panels.origSingerQuery.visible?'active':''}`}><i className={`fas fa-star mr-1 ${panels.origSingerQuery.visible?'text-orange-500':'text-gray-400'}`}></i>建檔原唱查詢</button>
                                            {/* 特殊查詢 */}
                                            <button onClick={()=>togglePanelVisibility('specialQuery')} className={`menu-link text-sm text-left ${panels.specialQuery.visible?'active':''}`}><i className={`fas fa-bolt mr-1 ${panels.specialQuery.visible?'text-orange-500':'text-gray-400'}`}></i>特殊查詢</button>
                                            <button onClick={()=>togglePanelVisibility('haojiQuery')} className={`menu-link text-sm text-left ${panels.haojiQuery.visible?'active':''}`}><i className={`fas fa-compact-disc mr-1 ${panels.haojiQuery.visible?'text-orange-500':'text-gray-400'}`}></i>豪記查詢</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white rounded-lg overflow-hidden card-shadow mt-2">
                                <div className="p-3 flex justify-between items-center bg-[#2EA9DF] text-white font-bold text-lg"><div className="flex items-center gap-2"><i className="fas fa-globe"></i> 網頁查詢</div><button onClick={() => setPanels(prev => ({...prev, webQuery: { ...prev.webQuery, collapsed: !prev.webQuery.collapsed } }))} className="w-8 h-8 rounded-full hover:bg-white/20 flex items-center justify-center transition-colors focus:outline-none"><i className={`fas fa-chevron-${panels.webQuery.collapsed ? 'down' : 'up'}`}></i></button></div>
                                {!panels.webQuery.collapsed && (<div className="p-2 flex flex-col gap-2"><div className="flex justify-start"><a href={links.copyright.must} target="_blank" className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-3 py-1 rounded text-sm inline-flex items-center shadow transition-colors"><i className="fas fa-music mr-2"></i> 前往 MÜST 著作權協會查詢</a></div><div className="grid grid-cols-1 md:grid-cols-2 gap-2">{embeddedSites.map((site, index) => <WebBrowser key={index} title={site.title} url={site.url} scale={site.scale} />)}</div></div>)}
                            </div>

                            {/* 查詢面板 */}
                            {panels.copyright.visible && <div className="search-panel card-shadow"><div className="search-header p-3 flex justify-between items-center border-b border-gray-200"><div className="flex items-center gap-2"><i className="fas fa-search text-orange-500"></i><span>版權查詢</span></div><div className="flex items-center gap-3"><a href={links.copyright.querySource} target="_blank" className="text-xs text-blue-500 hover:underline"><i className="fas fa-external-link-alt mr-1"></i>開啟原始試算表</a><button onClick={()=>togglePanelCollapse('copyright')} className="w-6 h-6 rounded-full hover:bg-gray-200 flex items-center justify-center transition-colors focus:outline-none"><i className={`fas fa-chevron-${panels.copyright.collapsed ? 'down' : 'up'} text-gray-500`}></i></button></div></div>{!panels.copyright.collapsed && <div className="p-4 bg-white"><CopyrightSearchBlock hook={copyright1} label="搜尋 1" headers={copyrightHeaders} enableCopy={true} remakeColIndex={3} mpaColIndex={4} /><CopyrightSearchBlock hook={copyright2} label="搜尋 2" headers={copyrightHeaders} enableCopy={true} remakeColIndex={3} mpaColIndex={4} /><CopyrightSearchBlock hook={copyright3} label="搜尋 3" headers={copyrightHeaders} enableCopy={true} remakeColIndex={3} mpaColIndex={4} /></div>}</div>}
                            {panels.recordedQuery.visible && <div className="search-panel card-shadow"><div className="search-header p-3 flex justify-between items-center border-b border-gray-200"><div className="flex items-center gap-2"><i className="fas fa-check-circle text-orange-500"></i><span>已錄曲目查詢</span></div><div className="flex items-center gap-3"><a href={links.others.recordedQuerySource} target="_blank" className="text-xs text-blue-500 hover:underline"><i className="fas fa-external-link-alt mr-1"></i>開啟原始試算表</a><button onClick={()=>togglePanelCollapse('recordedQuery')} className="w-6 h-6 rounded-full hover:bg-gray-200 flex items-center justify-center transition-colors focus:outline-none"><i className={`fas fa-chevron-${panels.recordedQuery.collapsed ? 'down' : 'up'} text-gray-500`}></i></button></div></div>{!panels.recordedQuery.collapsed && <SimpleSearchPanel hook={recorded} placeholder="請輸入歌名並按下搜尋" headers={recordedHeaders} enableCopy={false} remakeColIndex={8} mpaColIndex={9} medleyColIndex={5} note="可輸入關鍵字,避開台語字" />}</div>}
                            {panels.epQuery.visible && <div className="search-panel card-shadow"><div className="search-header p-3 flex justify-between items-center border-b border-gray-200"><div className="flex items-center gap-2"><i className="fas fa-list-ol text-orange-500"></i><span>集數查詢</span></div><div className="flex items-center gap-3"><a href={links.others.epQuerySource} target="_blank" className="text-xs text-blue-500 hover:underline"><i className="fas fa-external-link-alt mr-1"></i>開啟原始試算表</a><button onClick={()=>togglePanelCollapse('epQuery')} className="w-6 h-6 rounded-full hover:bg-gray-200 flex items-center justify-center transition-colors focus:outline-none"><i className={`fas fa-chevron-${panels.epQuery.collapsed ? 'down' : 'up'} text-gray-500`}></i></button></div></div>{!panels.epQuery.collapsed && <SimpleSearchPanel hook={epQuery} placeholder="請輸入集數..." headers={epHeaders} enableCopy={true} defaultColumnSelection="none" remakeColIndex={7} mpaColIndex={8} medleyColIndex={5} />}</div>}

                            {panels.specialQuery.visible && <div className="search-panel card-shadow"><div className="search-header p-3 flex justify-between items-center border-b border-gray-200"><div className="flex items-center gap-2"><i className="fas fa-bolt text-orange-500"></i><span>特殊查詢</span></div><div className="flex items-center gap-3"><a href={links.others.epQuerySource} target="_blank" className="text-xs text-blue-500 hover:underline"><i className="fas fa-external-link-alt mr-1"></i>開啟原始試算表</a><button onClick={()=>togglePanelCollapse('specialQuery')} className="w-6 h-6 rounded-full hover:bg-gray-200 flex items-center justify-center transition-colors focus:outline-none"><i className={`fas fa-chevron-${panels.specialQuery.collapsed ? 'down' : 'up'} text-gray-500`}></i></button></div></div>{!panels.specialQuery.collapsed && <SpecialSearchPanel hook={special} headers={specialHeaders} enableCopy={false} remakeColIndex={3} mpaColIndex={4} />}</div>}

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
