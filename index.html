<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綜藝👍級棒 - 系統目錄</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FCFAF2; color: #2D3436; padding-bottom: 80px; }
        .header-main { background-color: #F08300; color: white; letter-spacing: 0.15em; box-shadow: 0 4px 0px #C86000; }
        .left-header-blue { background-color: #2EA9DF; color: white; }
        .left-sub-blue { background-color: #A0D8EF; color: #005C85; }
        .bonus-header { background-color: #E95295; color: white; }
        .bonus-text { color: #C70067; }
        .rating-purple-header { background-color: #6F599C; color: white; }
        .rating-bg-light { background-color: #F3F0F9; }
        .menu-header { background-color: #2EA9DF; color: white; letter-spacing: 0.1em;}
        .menu-category { background-color: #7DB9DE; color: #FFFFFF; font-weight: bold; }
        .menu-link { color: #1B813E; font-weight: 500; text-decoration: none; border-bottom: none; transition: all 0.2s; padding: 4px 8px; border-radius: 4px; cursor: pointer; display: inline-block; }
        .menu-link:hover, .menu-link.active { color: #F08300; background-color: rgba(240, 131, 0, 0.08); }
        .search-panel { background-color: #FFFFFF; border: 2px solid #2EA9DF; border-radius: 8px; overflow: hidden; margin-top: 10px; transition: all 0.3s ease; }
        .search-header { background-color: #E6F4F1; color: #2D3436; font-weight: bold; }
        
        .result-table { table-layout: fixed; width: 100%; }
        .result-table th { 
            background-color: #E2E8F0; color: #2D3436; font-size: 0.8rem; 
            padding: 4px 4px; vertical-align: middle; border: 1px solid #CBD5E0; 
            font-weight: bold; text-align: center; line-height: 1.1; height: 40px; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .result-table td { 
            padding: 6px 4px; font-size: 0.9rem; border: 1px solid #E2E8F0; 
            vertical-align: middle; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis; max-width: 1px;
        }
        .result-table tr:hover { background-color: #FFF9E5; }
        .link-cell { color: #2980b9; text-decoration: underline; font-weight: bold; }
        .header-small { display: block; font-size: 0.65rem; color: #666; transform: scale(0.95); font-weight: normal; }
        .card-shadow { box-shadow: 0 2px 5px rgba(0,0,0,0.08); border-radius: 6px; border: 1px solid #E5E5E5; }
        .font-compact { letter-spacing: -0.02em; }
        
        /* 網頁查詢視窗 */
        .browser-frame-container { border: 2px solid #A0D8EF; border-radius: 6px; overflow: hidden; background: white; height: 350px; display: flex; flex-direction: column; }
        .browser-toolbar { background: #E1F5FE; padding: 4px 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #B3E5FC; height: 32px; }
        .browser-title { font-weight: bold; color: #0277BD; font-size: 0.8rem; display: flex; align-items: center; gap: 4px; }
        .browser-actions { display: flex; gap: 4px; }
        .browser-btn { color: #0288D1; cursor: pointer; transition: all 0.2s; padding: 2px; font-size: 0.8rem; }
        .browser-btn:hover { color: #01579B; background-color: rgba(255,255,255,0.5); border-radius: 4px; }
        .browser-content-wrapper { flex: 1; width: 100%; height: 100%; overflow: hidden; position: relative; }
        .browser-iframe { width: 118%; height: 118%; transform: scale(0.85); transform-origin: 0 0; border: none; background: white; position: absolute; top: 0; left: 0; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 1. 標題定義
        const copyrightHeaders = [
            {render:()=><span>次數<span className="header-small">(無除夕)</span></span>, width:"50px"},
            {render:()=><span>唱過<span className="header-small">(無45轉)</span></span>, width:"70px"},
            {render:"歌名", width:"150px"},
            {render:"重製", width:"55px"}, 
            {render:"MPA", width:"55px"},  
            {render:"首句歌詞", width:"160px"},
            {render:"原唱人", width:"70px"}, 
            {render:"連結", width:"60px"},   
            {render:"特殊備註", width:"120px"},
            {render:"作詞人", width:"70px"}, 
            {render:()=><span>詞<br/>公權</span>, width:"55px"}, 
            {render:"詞重權", width:"70px"}, 
            {render:()=><span>詞<br/>百分比</span>, width:"55px"}, 
            {render:"作曲人", width:"70px"}, 
            {render:"曲公權", width:"55px"}, 
            {render:"曲重權", width:"70px"}, 
            {render:()=><span>曲<br/>百分比</span>, width:"55px"}, 
            {render:"編曲", width:"70px"} 
        ];
        
        // 原唱查詢標題 (同版權查詢，扣除前兩欄)
        const origSingerHeaders = [
            {render:"歌名", width:"150px"},
            {render:"重製", width:"55px"}, 
            {render:"MPA", width:"55px"},  
            {render:"首句歌詞", width:"160px"},
            {render:"原唱人", width:"70px"}, 
            {render:"連結", width:"60px"},   
            {render:"特殊備註", width:"120px"},
            {render:"作詞人", width:"70px"}, 
            {render:()=><span>詞<br/>公權</span>, width:"55px"}, 
            {render:"詞重權", width:"70px"}, 
            {render:()=><span>詞<br/>百分比</span>, width:"55px"}, 
            {render:"作曲人", width:"70px"}, 
            {render:"曲公權", width:"55px"}, 
            {render:"曲重權", width:"70px"}, 
            {render:()=><span>曲<br/>百分比</span>, width:"55px"}, 
            {render:"編曲", width:"70px"} 
        ];

        const recordedHeaders = [
            {title:"集數", width:"50px"},
            {title:"播出日期", width:"90px"}, 
            {title:"單元", width:"150px"}, 
            {title:"歌名", width:"150px"},
            {title:"演唱者", width:"70px"}, 
            {title:"組曲", width:"40px"},
            {title:"錄影日期", width:"90px"},
            {title:"錄影日期", width:"90px"},
            {title:"重製", width:"55px"},
            {title:"MPA", width:"55px"},
            {title:"首句歌詞", width:"160px"},
            {title:"原唱人", width:"70px"},
            {title:"連結", width:"60px"},
            {title:"特殊備註", width:"120px"},
            {title:"作詞人", width:"70px"},
            {title:"詞公權", width:"55px"},
            {title:"詞重權", width:"70px"},
            {title:"詞百分比", width:"55px"},
            {title:"作曲人", width:"70px"},
            {title:"曲公權", width:"55px"},
            {title:"曲重權", width:"70px"},
            {title:"曲百分比", width:"55px"},
            {title:"編曲", width:"70px"}
        ];

        const singerListHeaders = [
            {title:"唱過", width:"50px"},
            {title:"日期", width:"80px"},
            {title:"歌手", width:"70px"},
            {title:"歌名", width:"150px"},
            {title:"原唱", width:"90px"},
            {title:"重製", width:"55px"},
            {title:"MPA", width:"55px"},
            {title:"首句歌詞", width:"180px"},
            {title:"原唱人", width:"70px"},
            {title:"連結", width:"60px"},
            {title:"特殊備註", width:"120px"}
        ];

        const epHeaders = [
            {title:"集數", width:"50px"},
            {title:"播出日期", width:"90px"},
            {title:"單元", width:"120px"},
            {title:"曲目", width:"140px"},
            {title:"演唱者", width:"90px"},
            {title:"組曲", width:"50px"},
            {title:"錄影日期", width:"90px"},
            {title:"重製", width:"60px"},
            {title:"MPA", width:"70px"},
            {title:"首句歌詞", width:"160px"},
            {title:"原唱人", width:"90px"},
            {title:"連結", width:"70px"},
            {title:"特殊備註", width:"100px"}
        ];

        const singerSungHeaders = [
            {title:"集數", width:"50px"},
            {title:"播出日期", width:"90px"},
            {title:"單元", width:"100px"},
            {title:"曲目", width:"150px"},
            {title:"演唱者", width:"90px"},
            {title:"組曲", width:"50px"},
            {title:"錄影日期", width:"90px"},
            {title:"重製", width:"60px"},
            {title:"MPA", width:"70px"}, 
            {title:"首句歌詞", width:"160px"},
            {title:"原唱人", width:"90px"},
            {title:"連結", width:"70px"},
            {title:"特殊備註", width:"120px"}
        ];

        const haojiHeaders = [
            {title:"位置", width:"80px"},
            {title:"歌名", width:"150px"},
            {title:"原唱人", width:"90px"},
            {title:"作詞人", width:"90px"},
            {title:"作曲人", width:"90px"},
            {title:"版權資訊", width:"140px"},
            {title:"首句歌詞", width:"160px"},
            {title:"備註", width:"100px"}
        ];

        // 2. 連結設定
        const links = {
            download: { authPublic: "https://docs.google.com/document/d/1clnHPqpcsxw1eZromz-LdavIyeA5jUKDGxia8Tg2Bk4/export?format=docx", authRemake: "https://docs.google.com/document/d/17Pq1NKTkKWNBZh0FEFkHOAh-TJO6Ypc2HECIy0RcpnE/export?format=docx" },
            program: { schedule: "https://docs.google.com/spreadsheets/d/1WULc6ENn4a6_VolJX_1rMjKnRbNzf3SwPRr7geLXnCQ/edit?gid=580247079#gid=580247079", icebing: "https://docs.google.com/spreadsheets/u/0/d/1lQcpINzgcsEWdl-PZpUTxpiFA90KE6DnN_70xFwl8fk/edit" },
            copyright: { member: "https://docs.google.com/spreadsheets/d/1vglQpFQ5Ikpk9BWTnnmQR396zKkFRuro97SoA_xNuns/edit?gid=1616151799#gid=1616151799", mpa: "https://docs.google.com/spreadsheets/d/1KvUTxEF5Az-qhXaGnr-BzPFxO39s4se2Oi0-1ssADbM/edit?gid=1591903723#gid=1591903723", querySource: "https://docs.google.com/spreadsheets/d/1KxHAmz57FOu8ti8l_Zd96lrwCfO5wexPRV0jsvNaVGA/edit?gid=0#gid=0", must: "https://www.must.org.tw/tw/chinese_musical/02.aspx" },
            others: { singerListSource: "https://docs.google.com/spreadsheets/d/1mt4dVA3_VmqzyKjf0jbmYQMzJl0sef4G2hcqve7KDQ0/edit?gid=530920512#gid=530920512", epQuerySource: "https://docs.google.com/spreadsheets/d/1KvUTxEF5Az-qhXaGnr-BzPFxO39s4se2Oi0-1ssADbM/edit?gid=622192856#gid=622192856", recordedQuerySource: "https://docs.google.com/spreadsheets/d/1KvUTxEF5Az-qhXaGnr-BzPFxO39s4se2Oi0-1ssADbM/edit?gid=1872621493#gid=1872621493", singerSungQuerySource: "https://docs.google.com/spreadsheets/d/1KvUTxEF5Az-qhXaGnr-BzPFxO39s4se2Oi0-1ssADbM/edit?gid=399230212#gid=399230212", haojiQuerySource: "https://docs.google.com/spreadsheets/d/1BiIWEn1Yh22nOZM_z-HFyNryX_AsjmjnH366VUDRuPg/edit?gid=829761523#gid=829761523", haojiQuery: "#" }
        };

        // 3. 子元件：版權查詢區塊
        const CopyrightSearchBlock = ({ hook, label }) => (
            <div className="mb-4 border-b border-gray-200 pb-4 last:border-0 last:pb-0">
                <div className="font-bold text-gray-500 text-sm mb-2">{label}</div>
                <form onSubmit={(e)=>{e.preventDefault();hook.search(hook.term)}} className="flex gap-2 mb-1">
                    <input type="text" value={hook.term} onChange={(e)=>hook.setTerm(e.target.value)} placeholder="請輸入歌名並按下搜尋" className="flex-1 border-2 border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-400 transition-colors" />
                    <button type="submit" disabled={hook.loading} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-4 py-2 rounded shadow transition-colors">{hook.loading?'...':'查詢'}</button>
                </form>
                <div className="text-gray-400 text-xs mb-2">可輸入關鍵字,避開台語字</div>
                {hook.error && <div className="text-red-500 text-sm mb-2">{hook.error}</div>}
                {hook.results && (
                    <div className="overflow-x-auto border border-gray-200 rounded">
                        <table className="result-table text-left border-collapse">
                            <thead><tr>{copyrightHeaders.map((h,i)=><th key={i} style={{width:h.width}}>{typeof h.render==='function'?h.render():h.render}</th>)}</tr></thead>
                            <tbody>{hook.results.map((row,ri)=><tr key={ri}>{row.filter((_,idx)=>idx!==2).map((c,ci)=><td key={ci} title={typeof c==='string'?c:''}>{ci===7?<a href={c} target="_blank" rel="noopener noreferrer" className="link-cell"><i className="fas fa-link mr-1 text-xs"></i>Link</a>:c}</td>)}</tr>)}</tbody>
                        </table>
                    </div>
                )}
            </div>
        );

        // 4. 子元件：網頁瀏覽器
        const WebBrowser = ({ title, url, type = "iframe" }) => {
            const [refreshKey, setRefreshKey] = useState(0);
            if (type === "link") {
                return (
                    <div className="browser-frame-container card-shadow">
                         <div className="browser-toolbar"><div className="browser-title"><i className="fas fa-music text-orange-500"></i> {title}</div></div>
                         <div className="flex flex-col items-center justify-center h-full bg-gray-50 p-4 text-center">
                             <i className="fas fa-external-link-alt text-4xl text-orange-500 mb-4"></i>
                             <p className="text-gray-600 font-bold mb-4">此網站無法內嵌</p>
                             <a href={url} target="_blank" className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-2 rounded shadow transition-colors">點此開啟 {title}</a>
                         </div>
                    </div>
                );
            }
            return (
                <div className="browser-frame-container card-shadow">
                    <div className="browser-toolbar">
                        <div className="browser-title"><i className="fas fa-globe text-blue-500"></i> {title}</div>
                        <div className="browser-actions">
                            <button onClick={() => window.open(url, '_blank')} className="browser-btn" title="在新分頁開啟 (跳出)"><i className="fas fa-external-link-alt"></i></button>
                            <button onClick={() => setRefreshKey(prev => prev + 1)} className="browser-btn" title="重新整理"><i className="fas fa-sync-alt"></i></button>
                        </div>
                    </div>
                    <div className="browser-content-wrapper">
                        <iframe key={refreshKey} src={url} className="browser-iframe" title={title} />
                    </div>
                </div>
            );
        };

        const App = () => {
            const API_URL = "https://script.google.com/macros/s/AKfycbzF7XVJK-rIoHBIQvEVF1c4AJJNR4x5f-wkqAaWwCLb9yMflTE3_c9MSEzwwglQQFTwYw/exec";
            
            const [sheetData, setSheetData] = useState(null);
            const [isLoadingInfo, setIsLoadingInfo] = useState(true);
            const [apiError, setApiError] = useState(null);

            const embeddedSites = [
                { title: "TMCA", url: "https://www.tmca.tw/Home/Search", type: "iframe" },
                { title: "ACMA", url: "https://www.acma.org.tw/blank-7", type: "iframe" }, 
            ];

            useEffect(() => {
                fetch(`${API_URL}?op=info`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) setApiError(data.error);
                        else setSheetData(data);
                        setIsLoadingInfo(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setApiError("連線失敗");
                        setIsLoadingInfo(false);
                    });
            }, []);

            const formatDateSimple = (val) => {
                if (!val) return "-";
                if (typeof val === 'string' && val.match(/^\d{1,2}\/\d{1,2}$/)) return val;
                try { const date = new Date(val); if (!isNaN(date.getTime())) return `${date.getMonth() + 1}/${date.getDate()}`; } catch(e) { return val; }
                return val;
            };

            const formatBonus = (val) => {
                if (val === "" || val === null || val === undefined) return "0";
                return val;
            };

            const safeInfoData = (data) => {
                if (!data || !data.infoData) return null;
                try {
                    return {
                        ...data.infoData,
                        today: { ...data.infoData.today, date: formatDateSimple(data.infoData.today.date) },
                        nextRecord: { ...data.infoData.nextRecord, date: formatDateSimple(data.infoData.nextRecord.date) },
                        broadcast: Array.isArray(data.infoData.broadcast) ? data.infoData.broadcast.map(item => ({ ...item, date: formatDateSimple(item.date) })) : [],
                        bonus: { lastMonth: formatBonus(data.infoData.bonus.lastMonth), thisMonth: formatBonus(data.infoData.bonus.thisMonth) }
                    };
                } catch (e) { return null; }
            };

            const infoData = safeInfoData(sheetData) || {
                today: { date: apiError ? "Err" : "載入中", day: ".." },
                nextRecord: { date: "..", day: "", daysLeft: "-" },
                broadcast: [{ title: "讀取中", date: "--/--", days: "-" }, { title: "讀取中", date: "--/--", days: "-" }],
                weekEp: { ep: "-", title: apiError ? "讀取失敗" : "資料讀取中..." },
                bonus: { lastMonth: "-", thisMonth: "-" }
            };

            const ratingData = (sheetData && sheetData.ratingData) ? sheetData.ratingData : {
                a4: Array(5).fill({ rank: "-", name: "載入中...", rating: "-" }),
                range2549: Array(5).fill({ rank: "-", name: "載入中...", rating: "-" })
            };

            const [panels, setPanels] = useState({
                copyright: { visible: false, collapsed: false },
                singerList: { visible: false, collapsed: false },
                epQuery: { visible: false, collapsed: false },
                recordedQuery: { visible: false, collapsed: false },
                singerSungQuery: { visible: false, collapsed: false },
                haojiQuery: { visible: false, collapsed: false },
                origSingerQuery: { visible: false, collapsed: false }, // 新增原唱查詢
                webQuery: { visible: true, collapsed: true } 
            });

            const useSearch = (type) => {
                const [term, setTerm] = useState("");
                const [results, setResults] = useState(null);
                const [loading, setLoading] = useState(false);
                const [error, setError] = useState(null);
                const clear = () => { setTerm(""); setResults(null); setError(null); setLoading(false); };
                const search = (customTerm, option = "") => {
                    const q = customTerm !== undefined ? customTerm : term;
                    if (!q || !q.trim()) return;
                    setLoading(true); setResults(null); setError(null);
                    fetch(`${API_URL}?op=search&type=${type}&q=${encodeURIComponent(q)}&opt=${option}`)
                        .then(res => res.json())
                        .then(data => { if (data.error) throw new Error(data.error); setResults(data); setLoading(false); })
                        .catch(err => { console.error(err); setError("讀取失敗"); setLoading(false); });
                };
                return { term, setTerm, results, setResults, loading, error, search, clear };
            };

            const copyright1 = useSearch('copyright');
            const copyright2 = useSearch('copyright');
            const copyright3 = useSearch('copyright');
            const singerList = useSearch('singerList');
            const epQuery = useSearch('ep');
            const recorded = useSearch('recorded');
            const singerSung = useSearch('singerSung');
            const haoji = useSearch('haoji');
            const origSinger = useSearch('origSinger'); // 新增原唱查詢

            const [singerExcludeSung, setSingerExcludeSung] = useState(false);

            const togglePanelVisibility = (key) => {
                setPanels(prev => {
                    if (prev[key].visible) {
                        if (key === 'copyright') { copyright1.clear(); copyright2.clear(); copyright3.clear(); }
                        if (key === 'singerList') singerList.clear();
                        if (key === 'epQuery') epQuery.clear();
                        if (key === 'recordedQuery') recorded.clear();
                        if (key === 'singerSungQuery') singerSung.clear();
                        if (key === 'haojiQuery') haoji.clear();
                        if (key === 'origSingerQuery') origSinger.clear(); // 清除
                    }
                    return { ...prev, [key]: { ...prev[key], visible: !prev[key].visible, collapsed: false } };
                });
            };
            
            const togglePanelCollapse = (key) => setPanels(prev => ({ ...prev, [key]: { ...prev[key], collapsed: !prev[key].collapsed } }));
            const handleSingerCheckboxChange = (e) => {
                const checked = e.target.checked;
                setSingerExcludeSung(checked);
                if (singerList.term) singerList.search(singerList.term, checked);
            };

            return (
                <div className="max-w-6xl mx-auto p-3 min-h-screen">
                    {apiError && <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-2 text-center"><strong className="font-bold">讀取錯誤！</strong> <span className="block sm:inline">{apiError}</span></div>}
                    <div className="header-main text-center py-2 text-xl font-bold rounded-lg mb-3">綜藝👍級棒</div>
                    <div className="flex flex-col md:flex-row gap-3 items-start">
                        
                        {/* 左側欄位 */}
                        <div className="w-full md:w-[28%] flex flex-col gap-3">
                            {/* ... (左側不變) ... */}
                            <div className="bg-white rounded-lg overflow-hidden card-shadow">
                                <div className="left-header-blue text-center font-bold py-1 text-sm tracking-wider">今日</div>
                                <div className="bg-white py-2 flex justify-center items-center gap-2">
                                    {isLoadingInfo ? <span className="text-gray-400 animate-pulse">...</span> : <><span className="text-xl font-bold text-gray-800 font-compact">{infoData.today.date}</span><span className="text-lg font-medium text-gray-500 font-compact">{infoData.today.day}</span></>}
                                </div>
                                <div className="left-header-blue text-center font-bold py-1 text-sm tracking-wider border-t border-white/20">下次錄影</div>
                                <div className="bg-white py-2 flex justify-center items-center gap-2">

                                        <div className="p-4 bg-white">
                                            <form onSubmit={(e)=>{e.preventDefault();origSinger.search(origSinger.term)}} className="flex gap-2 mb-4">
                                                <input type="text" value={origSinger.term} onChange={(e)=>origSinger.setTerm(e.target.value)} placeholder="請輸入歌手..." className="flex-1 border-2 border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-400 transition-colors" />
                                                <button type="submit" disabled={origSinger.loading} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-2 rounded shadow transition-colors">{origSinger.loading?'...':'查詢'}</button>
                                            </form>
                                            {origSinger.error && <div className="text-red-500 text-sm mb-2">{origSinger.error}</div>}
                                            {origSinger.results && (
                                                <div className="overflow-x-auto border border-gray-200 rounded">
                                                    <table className="result-table text-left border-collapse">
                                                        <thead><tr>{origSingerHeaders.map((h,i)=><th key={i} style={{width: h.width}}>{typeof h.render==='function'?h.render():h.render}</th>)}</tr></thead>
                                                        <tbody>{origSinger.results.map((row,ri)=><tr key={ri}>{row.map((c,ci)=><td key={ci} title={typeof c === 'string' ? c : ''}>{ci===5?<a href={c} target="_blank" rel="noopener noreferrer" className="link-cell"><i className="fas fa-link mr-1 text-xs"></i>Link</a>:c}</td>)}</tr>)}</tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {panels.haojiQuery.visible && (
                                <div className="search-panel card-shadow">
                                    <div className="search-header p-3 flex justify-between items-center border-b border-gray-200">
                                        <div className="flex items-center gap-2"><i className="fas fa-compact-disc text-orange-500"></i><span>豪記查詢</span></div>
                                        <div className="flex items-center gap-3">
                                            <a href={links.others.haojiQuerySource} target="_blank" className="text-xs text-blue-500 hover:underline"><i className="fas fa-external-link-alt mr-1"></i>開啟原始試算表</a>
                                            <button onClick={()=>togglePanelCollapse('haojiQuery')} className="w-6 h-6 rounded-full hover:bg-gray-200 flex items-center justify-center transition-colors focus:outline-none"><i className={`fas fa-chevron-${panels.haojiQuery.collapsed ? 'down' : 'up'} text-gray-500`}></i></button>
                                        </div>
                                    </div>
                                    {!panels.haojiQuery.collapsed && (
                                        <div className="p-4 bg-white">
                                            <form onSubmit={(e)=>{e.preventDefault();haoji.search(haoji.term)}} className="flex gap-2 mb-4">
                                                <input type="text" value={haoji.term} onChange={(e)=>haoji.setTerm(e.target.value)} placeholder="請輸入歌名..." className="flex-1 border-2 border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-blue-400 transition-colors" />
                                                <button type="submit" disabled={haoji.loading} className="bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-2 rounded shadow transition-colors">{haoji.loading?'...':'查詢'}</button>
                                            </form>
                                            {haoji.error && <div className="text-red-500 text-sm mb-2">{haoji.error}</div>}
                                            {haoji.results && (
                                                <div className="overflow-x-auto border border-gray-200 rounded">
                                                    <table className="result-table text-left border-collapse">
                                                        <thead><tr>{haojiHeaders.map((h,i)=><th key={i} style={{width: h.width}}>{h.title}</th>)}</tr></thead>
                                                        <tbody>{haoji.results.map((row,ri)=><tr key={ri}>{row.map((c,ci)=><td key={ci} title={typeof c === 'string' ? c : ''}>{c}</td>)}</tr>)}</tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
